<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Grafikų panelė PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

.badge{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  font-size:18px;
  background:#1f2937;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <div class="title">📅 Data</div>
  <input type="date" id="datePicker">
</div>

<div class="card">
  <div class="title">🌦 AI orų prognozė</div>
  <div id="weatherPrediction" class="badge">–</div>
  <div id="extraStats"></div>
</div>

<div class="card">
  <div class="title">🌡 Temperatūra</div>
  <canvas id="chartTemp"></canvas>
</div>

<div class="card">
  <div class="title">💧 Drėgmė</div>
  <canvas id="chartMoist"></canvas>
</div>

<div class="card">
  <div class="title">📈 Slėgis</div>
  <canvas id="chartPressure"></canvas>
</div>

</div>

<script>

// ===== CONFIG =====
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI";
const ESP_ID = "esp1";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart1, chart2, chart3;


// ===== LOAD DATA =====
async function loadData(dateStr){

  let data;

  // jei pasirinkta data → bandom filtruoti
  if(dateStr){
    const start = new Date(dateStr + "T00:00:00Z");
    const end = new Date(dateStr + "T23:59:59Z");

    const res = await db
      .from("status_log")
      .select("*")
      .eq("id", ESP_ID)
      .gte("timestamp", start.toISOString())
      .lte("timestamp", end.toISOString())
      .order("timestamp");

    data = res.data;
  }

  // fallback jei nėra → paskutinės 24h
  if(!data || data.length === 0){
    const res = await db
      .from("status_log")
      .select("*")
      .eq("id", ESP_ID)
      .order("timestamp", { ascending:false })
      .limit(24);

    data = res.data;
    if(data) data.reverse();
  }

  if(!data || data.length === 0){
    document.getElementById("weatherPrediction").textContent = "❌ Nėra duomenų";
    return;
  }

  // ===== PARSING =====
  const labels = data.map(r =>
    new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  );

  const temp = data.map(r => r.temp);
  const moist = data.map(r => r.moisture);
  const press = data.map(r => r.pressure);

  function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

  let prediction = "🌫 Stabilu";
  let rainChance = 0;
  let wind = 0;

  if (data.length >= 5){

    const last = data[data.length - 1];
    const prev = data.slice(-5);

    const dp = last.pressure - avg(prev.map(x=>x.pressure));
    const dh = last.moisture - avg(prev.map(x=>x.moisture));
    const dt = last.temp - avg(prev.map(x=>x.temp));

    // ===== AI logic =====
    if (dp < -4 && dh > 5){
      prediction = "⛈ Artėja lietus";
      rainChance = 80 + Math.abs(dp)*3;
      wind = Math.abs(dp)*2;
    }
    else if (dp < -2){
      prediction = "🌧 Blogėja oras";
      rainChance = 50 + Math.abs(dp)*5;
      wind = Math.abs(dp)*2;
    }
    else if (dp > 2){
      prediction = "☀️ Gerėja oras";
      rainChance = 10;
      wind = Math.abs(dp);
    }
    else{
      prediction = "🌫 Stabilu";
      rainChance = 20;
      wind = 2;
    }

    rainChance = Math.min(Math.round(rainChance),100);
    wind = Math.round(wind);
  }

  // UI
  document.getElementById("weatherPrediction").textContent =
    `${prediction} | 🌧 ${rainChance}% | 🌬 ${wind} m/s`;

  document.getElementById("extraStats").textContent =
    `Slėgis: ${press[press.length-1].toFixed(0)} hPa | Min: ${Math.min(...press)} | Max: ${Math.max(...press)}`;


  // DESTROY old
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();
  if(chart3) chart3.destroy();

  // TEMP
  chart1 = new Chart(document.getElementById("chartTemp"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"°C",
        data:temp,
        borderColor:"#ef4444",
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===temp.length-1?6:2
      }]
    }
  });

  // MOIST
  chart2 = new Chart(document.getElementById("chartMoist"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"%",
        data:moist,
        borderColor:"#3b82f6",
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===moist.length-1?6:2
      }]
    }
  });

  // PRESSURE
  const lastP = press[press.length-1];
  const color = lastP < 1000 ? "#ef4444" : "#22c55e";

  chart3 = new Chart(document.getElementById("chartPressure"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"hPa",
        data:press,
        borderColor:color,
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===press.length-1?6:2
      }]
    }
  });

}


// ===== INIT =====
const datePicker = document.getElementById("datePicker");
const today = new Date().toISOString().slice(0,10);

datePicker.value = today;

datePicker.onchange = () => loadData(datePicker.value);

// pirmas load
loadData(today);

// auto refresh (tik kai rodom šiandieną)
setInterval(()=>{
  if(datePicker.value === today){
    loadData(today);
  }
},60000);

</script>

</body>
</html>
