<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Grafikų panelė</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:var(--text);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

canvas{
  margin-top:15px;
}

.badge{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  font-size:18px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <div class="title">📅 Pasirink dieną</div>
  <input type="date" id="datePicker">
</div>

<div class="card">
  <div class="title">🌦 Orų prognozė</div>
  <div id="weatherPrediction" class="badge">–</div>
  <div id="pressureStats"></div>
</div>

<div class="card">
  <div class="title">🌡 Temperatūra</div>
  <canvas id="chartTemp"></canvas>
</div>

<div class="card">
  <div class="title">💧 Drėgmė</div>
  <canvas id="chartMoist"></canvas>
</div>

<div class="card">
  <div class="title">📈 Slėgis</div>
  <canvas id="chartPressure"></canvas>
</div>

</div>

<script>

// ===== CONFIG =====
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";
const ESP_ID = "esp1";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart1, chart2, chart3;

// ===== LOAD DATA =====
async function loadData(dateStr){

  const start = new Date(dateStr);
  start.setHours(0,0,0,0);

  const end = new Date(dateStr);
  end.setHours(23,59,59,999);

  const { data } = await db
    .from("status_log")
    .select("*")
    .eq("id", ESP_ID)
    .gte("timestamp", start.toISOString())
    .lte("timestamp", end.toISOString())
    .order("timestamp");

  if(!data || data.length === 0){
    alert("Nėra duomenų");
    return;
  }

  const labels = data.map(r =>
    new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  );

  const temp = data.map(r => r.temp);
  const moist = data.map(r => r.moisture);
  const press = data.map(r => r.pressure);

  // ===== WEATHER PREDICTION =====
  let prediction = "🌫 Stabilu";

  if (press.length >= 2) {
    const last = press[press.length - 1];
    const prev = press[Math.max(press.length - 4, 0)];
    const diff = last - prev;

    if (diff > 2) prediction = "☀️ Gerėja oras";
    else if (diff < -2) prediction = "🌧 Blogėja oras";
  }

  const minP = Math.min(...press);
  const maxP = Math.max(...press);

  document.getElementById("weatherPrediction").textContent = prediction;
  document.getElementById("pressureStats").textContent =
    `Slėgis: ${press[press.length - 1].toFixed(0)} hPa | Min: ${minP} | Max: ${maxP}`;

  // DESTROY OLD
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();
  if(chart3) chart3.destroy();

  // TEMP
  chart1 = new Chart(document.getElementById("chartTemp"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"°C",
        data:temp,
        borderColor:"#ef4444",
        tension:0.3,
        pointRadius:(ctx)=>ctx.dataIndex===temp.length-1?6:2
      }]
    }
  });

  // MOISTURE
  chart2 = new Chart(document.getElementById("chartMoist"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"%",
        data:moist,
        borderColor:"#3b82f6",
        tension:0.3,
        pointRadius:(ctx)=>ctx.dataIndex===moist.length-1?6:2
      }]
    }
  });

  // PRESSURE COLOR LOGIC
  const lastP = press[press.length-1];
  const color = lastP < 1000 ? "#ef4444" : "#22c55e";

  // PRESSURE
  chart3 = new Chart(document.getElementById("chartPressure"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"hPa",
        data:press,
        borderColor:color,
        tension:0.3,
        pointRadius:(ctx)=>ctx.dataIndex===press.length-1?6:2
      }]
    }
  });
}

// ===== INIT =====
const datePicker = document.getElementById("datePicker");
const today = new Date().toISOString().slice(0,10);

datePicker.value = today;
datePicker.onchange = () => loadData(datePicker.value);

loadData(today);

</script>

</body>
</html>
