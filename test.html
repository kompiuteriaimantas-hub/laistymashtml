<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Dashboard PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  transition:0.4s;
}
.container{max-width:1000px;margin:auto;padding:20px;}
.card{background:#111827;border-radius:14px;padding:15px;margin:10px 0;}
.title{font-weight:bold;margin-bottom:6px;}
.badge{padding:8px;border-radius:8px;background:#1f2937;}
canvas{margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="title">📡 Status</div>
<div id="live" class="badge">–</div>
</div>

<div class="card">
<div class="title">🌦 AI prognozė</div>
<div id="forecast" class="badge">–</div>
<div id="alerts"></div>
</div>

<div class="card">
<div class="title">🌱 Laistymas</div>
<div id="watering"></div>
</div>

<div class="card">
<div class="title">🔥 Stress</div>
<div id="stress"></div>
</div>

<div class="card">
<div class="title">🌡 Temperatūra</div>
<canvas id="chartTemp"></canvas>
</div>

<div class="card">
<div class="title">💧 Drėgmė</div>
<canvas id="chartMoist"></canvas>
</div>

<div class="card">
<div class="title">📈 Slėgis</div>
<canvas id="chartPress"></canvas>
</div>

</div>

<script>

const db = supabase.createClient(
"https://wbueugwhngtgtifuasvm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI"
);

const ESP_ID = "esp1";

let chart1, chart2, chart3;

function avg(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

async function load(){

let {data} = await db
.from("status_log")
.select("*")
.eq("id",ESP_ID)
.order("timestamp",{ascending:false})
.limit(24);

if(!data || data.length===0) return;

data.reverse();

// ✅ apsauga nuo undefined
let temp = data.map(x=>x.temp ?? 0);
let moist = data.map(x=>x.moisture ?? 0);
let press = data.map(x=>x.pressure ?? 0);

let last = data[data.length-1];

// ===== STATUS =====
let diff = (Date.now()-new Date(last.timestamp))/1000;
document.getElementById("live").textContent =
diff<600?"🟢 LIVE":"🔴 OFFLINE";

// ===== AI =====
let prediction="Stable";
let rain=0, wind=0;

if(data.length>=5){
 let dp = last.pressure - avg(data.slice(-5).map(x=>x.pressure));
 let dh = last.moisture - avg(data.slice(-5).map(x=>x.moisture));

 if(dp<-4 && dh>5){
   prediction="⛈ Lietus";
   rain=90;
 }else if(dp<-2){
   prediction="🌧 Blogėja";
   rain=60;
 }else if(dp>2){
   prediction="☀️ Gerėja";
   rain=10;
 }else{
   prediction="🌫 Stabilu";
   rain=20;
 }
 wind=Math.abs(dp*2);
}

// UI
document.getElementById("forecast").textContent =
`${prediction} | 🌧 ${rain}% | 🌬 ${Math.round(wind)}m/s`;

// ===== ALERT =====
let a=[];
if(rain>70) a.push("🌧 Artėja lietus");
if(last.moisture<30) a.push("💧 Sausa");

document.getElementById("alerts").innerHTML =
a.length?a.join("<br>"):"✅ OK";

// ===== WATER =====
let w="OK";
if(last.moisture<35 && rain<40) w="💧 Laistyti";
if(rain>60) w="❌ Nelaistyti";
document.getElementById("watering").textContent=w;

// ===== STRESS =====
let stress = last.temp + (100-last.moisture);
document.getElementById("stress").textContent =
stress>120?"🔴 HIGH":
stress>90?"🟡 MID":"🟢 OK";

// ===== BG =====
if(prediction.includes("☀️")) document.body.style.background="#1e293b";
if(prediction.includes("🌧")) document.body.style.background="#020617";
if(prediction.includes("⛈")) document.body.style.background="#3b0000";

// ===== GRAPH DESTROY =====
if(chart1) chart1.destroy();
if(chart2) chart2.destroy();
if(chart3) chart3.destroy();

let labels = data.map(x=> new Date(x.timestamp).toLocaleTimeString());

// TEMP
chart1 = new Chart(document.getElementById("chartTemp"),{
 type:'line',
 data:{labels,
 datasets:[{data:temp,borderColor:"red",tension:0.3}]}
});

// MOIST
chart2 = new Chart(document.getElementById("chartMoist"),{
 type:'line',
 data:{labels,
 datasets:[{data:moist,borderColor:"blue",tension:0.3}]}
});

// PRESS
chart3 = new Chart(document.getElementById("chartPress"),{
 type:'line',
 data:{labels,
 datasets:[{data:press,borderColor:"lime",tension:0.3}]}
});

}

load();
setInterval(load,60000);

</script>

</body>
</html>
