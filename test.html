<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Grafikų panelė</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

canvas{
  margin-top:15px;
}

.badge{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  font-size:18px;
  background:#1f2937;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <div class="title">🌦 AI orų prognozė</div>
  <div id="weatherPrediction" class="badge">–</div>
  <div id="pressureStats" style="margin-top:10px;"></div>
</div>

<div class="card">
  <div class="title">🌡 Temperatūra</div>
  <canvas id="chartTemp"></canvas>
</div>

<div class="card">
  <div class="title">💧 Drėgmė</div>
  <canvas id="chartMoist"></canvas>
</div>

<div class="card">
  <div class="title">📈 Slėgis</div>
  <canvas id="chartPressure"></canvas>
</div>

</div>

<script>

// ===== CONFIG =====
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI";   // <-- įsidėk savo
const ESP_ID = "esp1";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart1, chart2, chart3;


// ===== LOAD DATA =====
async function loadData(){

  // ✅ stabilus metodas – paskutinės 24h
  const { data } = await db
    .from("status_log")
    .select("*")
    .eq("id", ESP_ID)
    .order("timestamp", { ascending: false })
    .limit(24);

  if(!data || data.length === 0){
    document.getElementById("weatherPrediction").textContent = "Nėra duomenų";
    return;
  }

  data.reverse(); // kad būtų nuo seniausių iki naujausių

  const labels = data.map(r =>
    new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  );

  const temp = data.map(r => r.temp);
  const moist = data.map(r => r.moisture);
  const press = data.map(r => r.pressure);

  // ===== AI WEATHER =====
  function avg(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

  let prediction = "🌫 Stabilu";
  let confidence = 0;

  if (data.length >= 5){

    const last = data[data.length - 1];
    const prev = data.slice(-5);

    const pNow = last.pressure;
    const pPrev = avg(prev.map(x=>x.pressure));

    const tNow = last.temp;
    const tPrev = avg(prev.map(x=>x.temp));

    const hNow = last.moisture;
    const hPrev = avg(prev.map(x=>x.moisture));

    const dp = pNow - pPrev;
    const dt = tNow - tPrev;
    const dh = hNow - hPrev;

    if (dp < -4 && dh > 5) {
      prediction = "⛈ Greitai lietus";
    }
    else if (dp < -2 && dh > 2) {
      prediction = "🌧 Blogėja oras";
    }
    else if (dp > 2 && dt > 1) {
      prediction = "☀️ Gerėja oras";
    }
    else if (Math.abs(dp) < 1) {
      prediction = "🌫 Stabilu";
    }
    else {
      prediction = "🌤 Nedidelis pokytis";
    }

    confidence = Math.min(Math.abs(dp)*10 + Math.abs(dh)*5, 100);
  }

  const minP = Math.min(...press);
  const maxP = Math.max(...press);

  document.getElementById("weatherPrediction").textContent =
    prediction + " (" + Math.round(confidence) + "%)";

  document.getElementById("pressureStats").textContent =
    `Dabar: ${press[press.length-1].toFixed(0)} hPa | Min: ${minP} | Max: ${maxP}`;


  // DESTROY old
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();
  if(chart3) chart3.destroy();


  // TEMP
  chart1 = new Chart(document.getElementById("chartTemp"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"°C",
        data:temp,
        borderColor:"#ef4444",
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===temp.length-1?6:2
      }]
    }
  });


  // MOIST
  chart2 = new Chart(document.getElementById("chartMoist"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"%",
        data:moist,
        borderColor:"#3b82f6",
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===moist.length-1?6:2
      }]
    }
  });


  // PRESSURE
  const lastP = press[press.length-1];
  const color = lastP < 1000 ? "#ef4444" : "#22c55e";

  chart3 = new Chart(document.getElementById("chartPressure"), {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:"hPa",
        data:press,
        borderColor:color,
        tension:0.3,
        pointRadius:(c)=>c.dataIndex===press.length-1?6:2
      }]
    }
  });

}


// ===== AUTO REFRESH =====
loadData();
setInterval(loadData, 60000); // kas 1 min atsinaujina

</script>

</body>
</html>
