<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST AI DASHBOARD</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  padding:20px;
}
.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">
<div id="status">STATUS...</div>
</div>

<div class="card">
<div id="debug">DEBUG...</div>
</div>

<canvas id="chart"></canvas>

<script>

const db = supabase.createClient(
"https://wbueugwhngtgtifuasvm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI"
);

const ESP_ID = "esp1";

async function load(){

try {

let { data, error } = await db
.from("status_log")
.select("*")
.eq("id", ESP_ID)
.order("timestamp", { ascending:false })
.limit(10);

console.log("DATA:", data);
console.log("ERROR:", error);

// ✅ DEBUG UI
document.getElementById("debug").textContent =
JSON.stringify(data?.[0] || "NO DATA", null, 2);

// ❌ jei nėra
if(!data || data.length===0){
  document.getElementById("status").textContent="❌ Nėra duomenų";
  return;
}

// ✅ test fields
let temp = data.map(x => x.temp ?? x.temperature ?? 0);

document.getElementById("status").textContent =
"✅ OK, gauta: " + data.length + " įrašų";

// ✅ chart
new Chart(chart,{
 type:'line',
 data:{
  labels:data.map(x=>x.id),
  datasets:[{data:temp, borderColor:"red"}]
 }
});

} catch(e){
console.log(e);
document.getElementById("status").textContent = "💥 JS ERROR";
}

}

load();

</script>
</body>
</html>
