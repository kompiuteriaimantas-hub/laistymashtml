<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Dashboard PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
}

.title{
  font-size:13px;
  opacity:0.6;
}

.value{
  font-size:20px;
  font-weight:600;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#facc15;}

canvas{margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="grid">

<div class="card">
<div class="title">📡 STATUS</div>
<div id="status" class="value">–</div>
</div>

<div class="card">
<div class="title">🌦 PROGNOZĖ</div>
<div id="forecast" class="value">–</div>
</div>

<div class="card">
<div class="title">⚠️ ALERTAI</div>
<div id="alerts" class="value">–</div>
</div>

<div class="card">
<div class="title">🌱 LAISTYMAS</div>
<div id="watering" class="value">–</div>
</div>

<div class="card">
<div class="title">🔥 STRESS</div>
<div id="stress" class="value">–</div>
</div>

</div>

<div class="card">
<div class="title">📅 Pasirink dieną</div>
<input type="date" id="dayPicker">
</div>

<div class="card">
<div class="title">🌡 Temperatūra</div>
<canvas id="chartTemp"></canvas>
</div>

<div class="card">
<div class="title">💧 Drėgmė</div>
<canvas id="chartMoist"></canvas>
</div>

<div class="card">
<div class="title">📈 Slėgis</div>
<canvas id="chartPress"></canvas>
</div>

</div>

<script>

const db = supabase.createClient(
"https://wbueugwhngtgtifuasvm.supabase.co",
"YOUR_KEY_HERE"
);

const ESP_ID = "esp1";

let c1, c2, c3;
let selectedDay = null;

function avg(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

// ✅ DATE INIT
document.addEventListener("DOMContentLoaded", () => {

  const picker = document.getElementById("dayPicker");

  const today = new Date();
  const iso =
    today.getFullYear() + "-" +
    String(today.getMonth()+1).padStart(2,'0') + "-" +
    String(today.getDate()).padStart(2,'0');

  picker.value = iso;
  selectedDay = iso;

  picker.addEventListener("change", () => {
    selectedDay = picker.value;
    load();
  });
});

async function load(){

try {

let { data, error } = await db
.from("status_log")
.select("*")
.eq("id", ESP_ID)
.order("timestamp", { ascending:false })
.limit(500);

if(error){
  console.log(error);
  return;
}

// ✅ VISADA NAUJAUSIAS STATUS (FIX glitch)
let newest = data[0];

// ===== STATUS =====
if(newest){
  const diff = (Date.now() - new Date(newest.timestamp).getTime()) / 1000;

  let statusEl = document.getElementById("status");

  if(diff < 1800){
    statusEl.textContent="🟢 ONLINE";
    statusEl.className="value green";
  }else if(diff < 7200){
    statusEl.textContent="🟡 DELAY";
    statusEl.className="value yellow";
  }else{
    statusEl.textContent="🔴 OFFLINE";
    statusEl.className="value red";
  }
}

// ✅ FILTRAS PAGAL LOCAL DAY
if(selectedDay){
  data = data.filter(x => {
    const d = new Date(x.timestamp);

    const dateStr =
      d.getFullYear() + "-" +
      String(d.getMonth()+1).padStart(2,'0') + "-" +
      String(d.getDate()).padStart(2,'0');

    return dateStr === selectedDay;
  });
}

if(!data || data.length === 0){
  document.getElementById("forecast").textContent="❌ Nėra duomenų";
  return;
}

// ✅ clean
data = data.filter(x =>
  x &&
  x.timestamp &&
  !isNaN(parseFloat(x.temp)) &&
  !isNaN(parseFloat(x.moisture)) &&
  !isNaN(parseFloat(x.pressure))
);

data.reverse();

let temp = data.map(x => parseFloat(x.temp));
let moist = data.map(x => parseFloat(x.moisture));
let press = data.map(x => parseFloat(x.pressure));

// ✅ labels LOCAL
let labels = data.map(x => {
  const d = new Date(x.timestamp);
  return d.toLocaleTimeString([], {
    hour:"2-digit",
    minute:"2-digit"
  });
});

let last = data[data.length-1];

// ===== AI =====
let prediction="🌫 Stabilu";
let rain=0;
let wind=0;

if(data.length>=5){

 let dp = press[press.length-1] - avg(press.slice(-5));
 let dh = moist[moist.length-1] - avg(moist.slice(-5));

 if(dp < -4 && dh > 5){
   prediction="⛈ Lietus";
   rain=90;
 }
 else if(dp < -2){
   prediction="🌧 Blogėja";
   rain=60;
 }
 else if(dp > 2){
   prediction="☀️ Gerėja";
   rain=10;
 }
 else{
   prediction="🌫 Stabilu";
   rain=20;
 }

 wind = Math.abs(dp * 2);
}

document.getElementById("forecast").textContent =
`${prediction} | 🌧 ${rain}% | 🌬 ${Math.round(wind)} m/s`;

// ===== ALERTAI =====
let alerts = [];

if(rain > 70) alerts.push("🌧 Lietus");
if(moist[moist.length-1] < 30) alerts.push("💧 Sausa");
if(temp[temp.length-1] > 30) alerts.push("🔥 Karšta");

document.getElementById("alerts").textContent =
alerts.length ? alerts.join(" • ") : "✅ OK";

// ===== WATERING =====
let water="✅ OK";

if(moist[moist.length-1] < 35 && rain < 40){
  water="💧 Laistyti";
}
if(rain > 60){
  water="❌ Nelaistyti";
}

document.getElementById("watering").textContent = water;

// ===== STRESS =====
let stressVal = temp[temp.length-1] + (100 - moist[moist.length-1]);

let sEl = document.getElementById("stress");

if(stressVal > 120){
  sEl.textContent="🔴 Pavojus";
  sEl.className="value red";
}
else if(stressVal > 90){
  sEl.textContent="🟡 Vidutinis";
  sEl.className="value yellow";
}
else{
  sEl.textContent="🟢 OK";
  sEl.className="value green";
}

// ===== CHART RESET =====
if(c1) c1.destroy();
if(c2) c2.destroy();
if(c3) c3.destroy();

// ===== GRAFIKAI =====
c1 = new Chart(chartTemp, {
 type:'line',
 data:{ labels, datasets:[{ data:temp, borderColor:"#ef4444" }] }
});

c2 = new Chart(chartMoist, {
 type:'line',
 data:{ labels, datasets:[{ data:moist, borderColor:"#3b82f6" }] }
});

c3 = new Chart(chartPress, {
 type:'line',
 data:{ labels, datasets:[{ data:press, borderColor:"#22c55e" }] }
});

} catch(e){
console.log("ERROR:", e);
}

}

// init
load();
setInterval(load, 60000);

</script>

</body>
</html>
