<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Dashboard PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:15px;
}

.title{
  font-size:13px;
  opacity:0.6;
}

.value{
  font-size:20px;
  font-weight:600;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#facc15;}

canvas{margin-top:10px;}

.controls{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.active{
  background:#22c55e;
  color:#000;
}
</style>
</head>

<body>

<div class="container">

<div class="grid">

<div class="card">
<div class="title">📡 STATUS</div>
<div id="status" class="value">–</div>
</div>

<div class="card">
<div class="title">🌦 PROGNOZĖ</div>
<div id="forecast" class="value">–</div>
</div>

<div class="card">
<div class="title">⚠️ ALERTAI</div>
<div id="alerts" class="value">–</div>
</div>

<div class="card">
<div class="title">🌱 LAISTYMAS</div>
<div id="watering" class="value">–</div>
</div>

<div class="card">
<div class="title">🔥 STRESS</div>
<div id="stress" class="value">–</div>
</div>

</div>

<div class="card">
<div class="title">📊 Laikotarpis</div>

<div class="controls">
  <button id="btnDay" class="active">📅 Diena</button>
  <button id="btnAll">📊 Visi</button>
</div>

<input type="date" id="dayPicker">
</div>

<div class="card">
<div class="title">🌡 Temperatūra</div>
<canvas id="chartTemp"></canvas>
</div>

<div class="card">
<div class="title">💧 Drėgmė</div>
<canvas id="chartMoist"></canvas>
</div>

<div class="card">
<div class="title">📈 Slėgis</div>
<canvas id="chartPress"></canvas>
</div>

</div>

<script>

const db = supabase.createClient(
"https://wbueugwhngtgtifuasvm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI"
);

const ESP_ID = "esp1";

let c1, c2, c3;

let selectedDay = null;
let mode = "day"; // day arba all

function avg(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

// INIT
document.addEventListener("DOMContentLoaded", () => {

  const picker = document.getElementById("dayPicker");

  const now = new Date();
  const today =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,'0') + "-" +
    String(now.getDate()).padStart(2,'0');

  picker.value = today;
  selectedDay = today;

  picker.addEventListener("change", () => {
    selectedDay = picker.value;
    load();
  });

  document.getElementById("btnDay").onclick = () => {
    mode = "day";
    btnDay.classList.add("active");
    btnAll.classList.remove("active");
    load();
  };

  document.getElementById("btnAll").onclick = () => {
    mode = "all";
    btnAll.classList.add("active");
    btnDay.classList.remove("active");
    load();
  };
});

async function load(){

try {

let { data, error } = await db
.from("status_log")
.select("*")
.eq("id", ESP_ID)
.order("timestamp", { ascending:false })
.limit(1000);

if(error){
  console.log(error);
  return;
}

if(!data || data.length === 0){
  document.getElementById("status").textContent="❌ Nėra duomenų";
  return;
}

// ===== STATUS =====
let newest = data[0];

const diff = (Date.now() - new Date(newest.timestamp)) / 1000;

let statusEl = document.getElementById("status");

if(diff < 3600){
  statusEl.textContent="🟢 ONLINE";
  statusEl.className="value green";
}else if(diff < 10800){
  statusEl.textContent="🟡 DELAY";
  statusEl.className="value yellow";
}else{
  statusEl.textContent="🔴 OFFLINE";
  statusEl.className="value red";
}

// ===== FILTRAS =====
if(mode === "day" && selectedDay){

  const start = new Date(selectedDay + "T00:00:00");
  const end = new Date(selectedDay + "T23:59:59");

  const filtered = data.filter(x => {
    const t = new Date(x.timestamp);
    return t >= start && t <= end;
  });

  if(filtered.length > 0){
    data = filtered;
  }
}

// ===== FIX undefined =====
data = data.filter(x =>
  x &&
  x.timestamp &&
  x.temp !== null &&
  x.moisture !== null &&
  x.pressure !== null
);

if(data.length === 0){
  document.getElementById("forecast").textContent="❌ Blogi duomenys";
  return;
}

data.reverse();

let temp = data.map(x => parseFloat(x.temp ?? 0));
let moist = data.map(x => parseFloat(x.moisture ?? 0));
let press = data.map(x => parseFloat(x.pressure ?? 0));

// LABELS
let labels = data.map(x => {
  const d = new Date(x.timestamp);
  return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
});

// ===== AI =====
let prediction="🌫 Stabilu";
let rain=0;
let wind=0;

if(data.length>=5){

 let dp = press.at(-1) - avg(press.slice(-5));
 let dh = moist.at(-1) - avg(moist.slice(-5));

 if(dp < -4 && dh > 5){
   prediction="⛈ Lietus";
   rain=90;
 }
 else if(dp < -2){
   prediction="🌧 Blogėja";
   rain=60;
 }
 else if(dp > 2){
   prediction="☀️ Gerėja";
   rain=10;
 }
 else{
   prediction="🌫 Stabilu";
   rain=20;
 }

 wind = Math.abs(dp * 2);
}

document.getElementById("forecast").textContent =
`${prediction} | 🌧 ${rain}% | 🌬 ${Math.round(wind)} m/s`;

// ALERTAI
let alerts = [];

if(rain > 70) alerts.push("🌧 Lietus");
if(moist.at(-1) < 30) alerts.push("💧 Sausa");
if(temp.at(-1) > 30) alerts.push("🔥 Karšta");

document.getElementById("alerts").textContent =
alerts.length ? alerts.join(" • ") : "✅ OK";

// WATER
let water="✅ OK";

if(moist.at(-1) < 35 && rain < 40){
  water="💧 Laistyti";
}
if(rain > 60){
  water="❌ Nelaistyti";
}

document.getElementById("watering").textContent = water;

// STRESS
let stressVal = temp.at(-1) + (100 - moist.at(-1));

let sEl = document.getElementById("stress");

if(stressVal > 120){
  sEl.textContent="🔴 Pavojus";
  sEl.className="value red";
}
else if(stressVal > 90){
  sEl.textContent="🟡 Vidutinis";
  sEl.className="value yellow";
}
else{
  sEl.textContent="🟢 OK";
  sEl.className="value green";
}

// ===== GRAFIKAI =====
if(c1) c1.destroy();
if(c2) c2.destroy();
if(c3) c3.destroy();

c1 = new Chart(chartTemp, {
 type:'line',
 data:{ labels, datasets:[{ data:temp, borderColor:"#ef4444", label:"°C" }] }
});

c2 = new Chart(chartMoist, {
 type:'line',
 data:{ labels, datasets:[{ data:moist, borderColor:"#3b82f6", label:"%" }] }
});

c3 = new Chart(chartPress, {
 type:'line',
 data:{ labels, datasets:[{ data:press, borderColor:"#22c55e", label:"hPa" }] }
});

} catch(e){
console.log("ERROR:", e);
}

}

load();
setInterval(load, 60000);

</script>

</body>
</html>
