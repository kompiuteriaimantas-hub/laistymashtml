<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Sodo sensorių dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    h2 { margin-top: 40px; }
    canvas { background: #222; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>

<h1>Sodo sensorių grafikai</h1>

<h2>Temperatūra (°C)</h2>
<canvas id="tempChart"></canvas>

<h2>Drėgmė (%)</h2>
<canvas id="humChart"></canvas>

<h2>Slėgis (hPa)</h2>
<canvas id="pressChart"></canvas>

<h2>WiFi RSSI (dBm)</h2>
<canvas id="wifiChart"></canvas>

<h2>Duomenų naudojimas (MB)</h2>
<canvas id="usageChart"></canvas>

<script>
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI";

// 7 dienų filtras
const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();

async function fetchTable(table) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&updated_at=gte.${since}&order=updated_at.asc`, {
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
        }
    });
    return res.json();
}

async function loadCharts() {
    const status = await fetchTable("status");
    const usage = await fetchTable("usage_history");

    const labels = status.map(r => r.updated_at);

    new Chart(tempChart, {
        type: "line",
        data: {
            labels,
            datasets: [{ label: "°C", data: status.map(r => r.temperature_c), borderColor: "orange" }]
        }
    });

    new Chart(humChart, {
        type: "line",
        data: {
            labels,
            datasets: [{ label: "%", data: status.map(r => r.moisture_percent), borderColor: "cyan" }]
        }
    });

    new Chart(pressChart, {
        type: "line",
        data: {
            labels,
            datasets: [{ label: "hPa", data: status.map(r => r.pressure_hpa), borderColor: "yellow" }]
        }
    });

    new Chart(wifiChart, {
        type: "line",
        data: {
            labels,
            datasets: [{ label: "dBm", data: status.map(r => r.wifi_rssi), borderColor: "red" }]
        }
    });

    new Chart(usageChart, {
        type: "line",
        data: {
            labels: usage.map(r => r.updated_at),
            datasets: [{
                label: "MB",
                data: usage.map(r => (r.usage_bytes / 1024 / 1024).toFixed(2)),
                borderColor: "lime"
            }]
        }
    });
}

loadCharts();
setInterval(loadCharts, 10000); // auto-refresh kas 10s
</script>

</body>
</html>
