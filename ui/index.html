<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI";


function sevenDaysAgo() {
    return new Date(Date.now() - 7*24*60*60*1000).toISOString();
}

async function fetchStatus() {
    const since = sevenDaysAgo();

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/status?select=*&updated_at=gte.${since}&order=updated_at.asc`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    );

    return res.json();
}

async function loadCharts() {
    const status = await fetchStatus();
    if (!status.length) return;

    const labels = status.map(r => r.updated_at);

    // TEMP
    if (window.tempChartObj) window.tempChartObj.destroy();
    window.tempChartObj = new Chart(tempChart, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "°C",
                data: status.map(r => r.temperature_c),
                borderColor: "orange"
            }]
        }
    });

    // HUM
    if (window.humChartObj) window.humChartObj.destroy();
    window.humChartObj = new Chart(humChart, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "%",
                data: status.map(r => r.moisture_percent),
                borderColor: "cyan"
            }]
        }
    });

    // PRESS
    if (window.pressChartObj) window.pressChartObj.destroy();
    window.pressChartObj = new Chart(pressChart, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "hPa",
                data: status.map(r => r.pressure_hpa),
                borderColor: "yellow"
            }]
        }
    });

    // WIFI
    if (window.wifiChartObj) window.wifiChartObj.destroy();
    window.wifiChartObj = new Chart(wifiChart, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "dBm",
                data: status.map(r => r.wifi_rssi),
                borderColor: "red"
            }]
        }
    });
}

loadCharts();
setInterval(loadCharts, 10000);
</script>
