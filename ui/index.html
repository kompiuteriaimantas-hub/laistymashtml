<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Šiandienos grafikai</title>
</head>
<body>

<canvas id="tempChart"></canvas>
<canvas id="humChart"></canvas>
<canvas id="pressChart"></canvas>
<canvas id="wifiChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const SUPABASE_URL = "https://wbueugwhngtgtifuasvm.supabase.co";
const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndidWV1Z3dobmd0Z3RpZnVhc3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzY1ODYsImV4cCI6MjA5NjI1MjU4Nn0.sOcV5GRsoIhhApmHhFnSCZ6NmDPcnkGrE6mSyQchSmI";


// Tik šiandienos data 00:00:00
function todayStart() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d.toISOString();
}

async function fetchStatusToday() {
    const start = todayStart();

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/status?select=*&updated_at=gte.${start}&order=updated_at.asc`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    );

    return res.json();
}

async function loadCharts() {
    const status = await fetchStatusToday();
    if (!status.length) {
        console.log("Šiandien nėra duomenų");
        return;
    }

    const labels = status.map(r => r.updated_at);

    new Chart(document.getElementById("tempChart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "°C",
                data: status.map(r => r.temperature_c),
                borderColor: "orange"
            }]
        }
    });

    new Chart(document.getElementById("humChart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "%",
                data: status.map(r => r.moisture_percent),
                borderColor: "cyan"
            }]
        }
    });

    new Chart(document.getElementById("pressChart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "hPa",
                data: status.map(r => r.pressure_hpa),
                borderColor: "yellow"
            }]
        }
    });

    new Chart(document.getElementById("wifiChart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "dBm",
                data: status.map(r => r.wifi_rssi),
                borderColor: "red"
            }]
        }
    });
}

loadCharts();
</script>

</body>
</html>
