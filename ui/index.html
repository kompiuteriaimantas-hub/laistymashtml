const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();

async function fetchStatus() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/status?select=*&updated_at=gte.${since}&order=updated_at.asc`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    );
    return res.json();
}

async function loadCharts() {
    const status = await fetchStatus();

    const labels = status.map(r => r.updated_at);

    new Chart(tempChart, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "°C",

                borderColor: "orange"
            }]
        }
    });
