<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Laistymo sistema</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<!-- ✅ GAUGES SCRIPT (FIXED) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>

</head>

<body>

<header class="header">
    <h1>🌱 Laistymo sistema</h1>
    <div id="onlineStatus" class="status">Tikrinama...</div>

    <div class="usage-box">
        <span id="usage">-</span>
        <button id="resetUsage">Reset</button>
    </div>
</header>

<main>

<section class="monthly">
    <h2>Mėnesio istorija</h2>
    <div id="monthlyUsage">Kraunama...</div>
</section>

<section class="gauges">

<div class="gauge">
    <canvas id="moistureGauge"></canvas>
    <div class="small"><span id="moisture">-</span>%</div>
</div>

<div class="gauge">
    <canvas id="tempGauge"></canvas>
    <div class="small"><span id="temperature">-</span>°C</div>
</div>

<div class="gauge">
    <canvas id="pressureGauge"></canvas>
    <div class="small"><span id="pressure">-</span> hPa</div>
</div>

</section>

<section class="relay">
    <h2>Relė</h2>
    <div>Būsena: <span id="relayState">-</span></div>

    <button id="relayBtn">Įjungti</button>

    <div>
        Lockdown: <span id="lockdownState">-</span> |
        WiFi: <span id="wifi">-</span>
    </div>
</section>

<section class="calibration">
    <button id="btnDry">SAUSA</button>
    <button id="btnWet">DRĖGNA</button>
    <button id="btnReset">Atstatyti sistemą</button>
</section>

</main>

<!-- ✅ TVARKINGI SCRIPT -->
<script src="gauges.js"></script>
<script src="app.js?v=999"></script>

</body>
</html>
