<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Laistymo sistema</title>
</head>
<body>

  <h2>Laistymo sistemos būsena</h2>

  <div class="status">
    Sistema: <span id="systemStatus">OK</span>
  </div>

  <div id="sensorData"></div>

  <script>
    const API = "https://laistymassodas.onrender.com";

    function loadData() {
      fetch(`${API}/api/sensors`)
        .then(res => res.json())
        .then(data => {
          document.getElementById("systemStatus").innerText = "OK";

          if (!data || data.length === 0) return;

          const last = data[0];
          document.getElementById("sensorData").innerHTML = `
            <p>Zona: ${last.zone}</p>
            <p>Drėgmė: ${last.moisture}%</p>
            <p>Temperatūra: ${last.temperature}°C</p>
            <p>Slėgis: ${last.pressure} hPa</p>
            <p>WiFi: ${last.wifi}</p>
          `;
        })
        .catch(err => {
          document.getElementById("systemStatus").innerText = "OFFLINE";
        });
    }

    loadData();
    setInterval(loadData, 5000);
  </script>

</body>
</html>
