<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Laistymo sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">
    <div class="header-left">
        <h1>🌱 Laistymo sistema</h1>
        <div class="status-row">
            <span id="onlineLed" class="led"></span>
            <span id="onlineStatus" class="status">ONLINE</span>
        </div>
    </div>

    <div class="usage-box">
        <span id="usage">-</span>
        <div class="usage-bar">
            <div id="usageFill"></div>
        </div>
    </div>
</header>

<main>

<section class="cards">
    <div class="card">
        <h2>Drėgmė</h2>
        <canvas id="moistureGauge"></canvas>
        <div class="value"><span id="moisture">-</span>%</div>
    </div>

    <div class="card">
        <h2>Temperatūra</h2>
        <canvas id="tempGauge"></canvas>
        <div class="value"><span id="temperature">-</span>°C</div>
    </div>

    <div class="card">
        <h2>Slėgis</h2>
        <canvas id="pressureGauge"></canvas>
        <div class="value"><span id="pressure">-</span> hPa</div>
    </div>
</section>

<!-- ✅ 3 grafikai -->
<section class="chart-section">
    <h2>💧 Drėgmė</h2>
    <canvas id="moistureChart"></canvas>
</section>

<section class="chart-section">
    <h2>🌡️ Temperatūra</h2>
    <canvas id="tempChart"></canvas>
</section>

<section class="chart-section">
    <h2>🧭 Slėgis</h2>
    <canvas id="pressureChart"></canvas>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
