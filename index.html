<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Laistymo sistema — ALIEN UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>LAISTYMO SISTEMA</h1>
    <span class="status online">ONLINE</span>
</header>

<section class="gauges">
    <div class="gauge">
        <div class="ring moisture">
            <span id="moistureVal">2%</span>
        </div>
        <label>Drėgmė</label>
    </div>

    <div class="gauge">
        <div class="ring temp">
            <span id="tempVal">25.4°C</span>
        </div>
        <label>Temperatūra</label>
    </div>

    <div class="gauge">
        <div class="ring pressure">
            <span id="pressureVal">1021 hPa</span>
        </div>
        <label>Slėgis</label>
    </div>
</section>

<section class="relay">
    <h2>Relė</h2>
    <p>Būsena: <span id="relayState">Išjungta</span></p>
    <p>Lockdown: <span id="lockdownState">NE</span></p>
    <button id="relayBtn" class="btn green">Įjungti</button>
</section>

<section class="system">
    <h2>Sistemos valdymas</h2>
    <button id="resetBtn" class="btn red">Atstatyti sistemą</button>
</section>

</body>
</html>
