<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Laistymo Sistema</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="header">
    <div class="left">
        <h1>🌱 Laistymo Sistema</h1>
        <div id="onlineStatus" class="status">Tikrinama...</div>
    </div>
    <div class="right">
        <span>Duomenų naudojimas:</span>
        <span id="usage">-</span>
    </div>
</header>

<main>

    <section class="cards">
        <div class="card">
            <h2>Drėgmė</h2>
            <div class="value"><span id="moisture">-</span>%</div>
            <div class="icon">💧</div>
        </div>

        <div class="card">
            <h2>Temperatūra</h2>
            <div class="value"><span id="temperature">-</span>°C</div>
            <div class="icon">🌡️</div>
        </div>

        <div class="card">
            <h2>Slėgis</h2>
            <div class="value"><span id="pressure">-</span> hPa</div>
            <div class="icon">🧭</div>
        </div>
    </section>

    <section class="relay-section">
        <h2>🔆 Relė valdymas</h2>
        <div class="relay-status">Būsena: <span id="relayState">-</span></div>

        <button id="relayBtn" class="relay-btn">Įjungti</button>

        <div class="relay-extra">
            <span>Lockdown: <span id="lockdownState">-</span></span>
            <span>WiFi: <span id="wifi">-</span> dBm</span>
        </div>
    </section>

    <section class="calibration">
        <h2>Kalibracija</h2>
        <div class="cal-buttons">
            <button class="btn dry" onclick="calibrateDry()">SAUSA</button>
            <button class="btn wet" onclick="calibrateWet()">DRĖGNA</button>
        </div>

        <h2>Sistemos valdymas</h2>
        <button class="btn reset" onclick="resetLockdown()">Atstatyti sistemą</button>
    </section>

    <section class="chart-section">
    <h2>Drėgmė %</h2>
    <canvas id="moistureChart"></canvas>

    <h2>Temperatūra °C</h2>
    <canvas id="tempChart"></canvas>

    <h2>Slėgis hPa</h2>
    <canvas id="pressureChart"></canvas>
</section>


</main>

<script src="script.js"></script>
</body>
</html>
