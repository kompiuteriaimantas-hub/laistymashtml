<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Laistymo sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>



</head>
<body>

<header class="header">
    <div>
        <h1>🌱 Laistymo sistema</h1>
        <div id="onlineStatus" class="status">Tikrinama...</div>
    </div>

    <div class="usage-box">
        <span>Duomenų naudojimas:</span>
        <span id="usage">-</span>

        <!-- Esamas mygtukas -->
        <button id="resetUsage" class="reset-btn">Reset</button>

        <!-- 🔥 Naujas mėnesio reset mygtukas -->
        <button id="resetMonth" class="reset-btn">Mėnesio reset</button>
    </div>
</header>

<main>

    <!-- MĖNESIO ISTORIJA -->
    <section class="monthly-section">
        <h2>📅 Mėnesio duomenų istorija</h2>
        <div id="monthlyUsage">Kraunama...</div>
    </section>

   

<section class="cards">

    <div class="card">
        <h2>Drėgmė</h2>
        <div id="moisture" class="value">0</div>
        <canvas id="gaugeMoisture" width="100" height="100"></canvas>
    </div>

    <div class="card">
        <h2>Temperatūra</h2>
        <div id="temperature" class="value">0</div>
        <canvas id="gaugeTemp" width="100" height="100"></canvas>
    </div>

    <div class="card">
        <h2>Slėgis</h2>
        <div id="pressure" class="value">0</div>
        <canvas id="gaugePressure" width="100" height="100"></canvas>
    </div>

</section>


    <section class="relay-section">
        <h2>🔆 Relė</h2>
        <div class="relay-status">Būsena: <span id="relayState">-</span></div>

        <button id="relayBtn" class="relay-btn">Įjungti</button>

        <div class="relay-extra">
            <span>Lockdown: <span id="lockdownState">-</span></span>
            <span>WiFi: <span id="wifi">-</span> dBm</span>
        </div>
    </section>

    <section class="calibration">
        <h2>Kalibracija</h2>

        <div class="cal-buttons">
            <button class="btn dry" id="btnDry">SAUSA</button>
            <button class="btn wet" id="btnWet">DRĖGNA</button>
        </div>

        <h2>Sistemos valdymas</h2>
        <button class="btn reset" id="btnReset">Atstatyti sistemą</button>
    </section>

</main>

<script src="app.js?v=999"></script>
