<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Laistymo sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">

    <!-- ✅ GAUGES -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>

    <!-- ✅ CHART -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">

    <div class="header-left">
        <h1>🌱 Laistymo sistema</h1>

        <div class="status-row">
            <span id="onlineLed" class="led"></span>
            <span id="onlineStatus" class="status">ONLINE</span>
        </div>
    </div>

    <div class="usage-box">
        <div class="usage-text">
            <span>Duomenų naudojimas</span>
            <span id="usage">-</span>
        </div>

        <div class="usage-bar">
            <div id="usageFill"></div>
        </div>

        <button id="resetUsage" class="reset-btn">Reset</button>
    </div>

</header>

<main>

    <!-- MĖNESIO ISTORIJA -->
    <section class="monthly-section">
        <h2>📅 Mėnesio duomenų istorija</h2>
        <div id="monthlyUsage">Kraunama...</div>
    </section>

    <!-- GAUGES -->
    <section class="cards">

        <div class="card">
            <h2>Drėgmė</h2>
            <canvas id="moistureGauge"></canvas>
            <div class="value">
                <span id="moisture">-</span>%
            </div>
            <div class="icon">💧</div>
        </div>

        <div class="card">
            <h2>Temperatūra</h2>
            <canvas id="tempGauge"></canvas>
            <div class="value">
                <span id="temperature">-</span>°C
            </div>
            <div class="icon">🌡️</div>
        </div>

        <div class="card">
            <h2>Slėgis</h2>
            <canvas id="pressureGauge"></canvas>
            <div class="value">
                <span id="pressure">-</span> hPa
            </div>
            <div class="icon">🧭</div>
        </div>

    </section>

    <!-- ✅ HISTORY CHART -->
    <section class="chart-section">
        <h2>📈 Istorija (48h)</h2>
        <canvas id="historyChart"></canvas>
    </section>

    <!-- RELAY -->
    <section class="relay-section">
        <h2>🔆 Relė</h2>
        <div class="relay-status">Būsena: <span id="relayState">-</span></div>

        <button id="relayBtn" class="relay-btn">Įjungti</button>

        <div class="relay-extra">
            <span>Lockdown: <span id="lockdownState">-</span></span>
            <span>WiFi: <span id="wifi">-</span> dBm</span>
        </div>
    </section>

    <!-- CALIBRATION -->
    <section class="calibration">
        <h2>Kalibracija</h2>

        <div class="cal-buttons">
            <button class="btn dry" id="btnDry">SAUSA</button>
            <button class="btn wet" id="btnWet">DRĖGNA</button>
        </div>

        <h2>Sistemos valdymas</h2>
        <button class="btn reset" id="btnReset">Atstatyti sistemą</button>
    </section>

</main>

<!-- ✅ APP -->
<script src="app.js"></script>

</body>
</html>
